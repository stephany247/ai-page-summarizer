<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PagePulse — AI Summarizer</title>

    <link rel="stylesheet" href="popup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="container">
      <div class="top-content">
        <div class="header">
          <h1>PagePulse — AI Summarizer</h1>
          <button type="button" title="Toggle theme" id="themeToggle" class="theme-btn">
            <i id="themeIcon" class="fa-solid fa-moon"></i>
          </button>
        </div>

        <div class="page-info">
          <p class="label">CURRENT PAGE</p>

          <div class="page-meta">
            <img alt="Favicon" id="favicon" />

            <div>
              <h2 id="pageTitle">Loading...</h2>

              <a id="pageUrl" target="_blank"></a>
            </div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab active" data-mode="standard">Standard</button>
          <button class="tab" data-mode="quick">Quick Digest</button>
        </div>

        <button id="summarizeBtn">SUMMARIZE PAGE</button>
        <div id="output">
          Click <span>summarize page</span> to extract this page into bullets,
          key insights, and an estimated reading time.
        </div>
      </div>
    </div>
    <div class="footer hidden">
      <div class="stats">
        <span id="readingTime"></span>
        <span>•</span>
        <span id="wordCount"></span>
      </div>

      <div class="footer-actions">
        <button id="copyBtn">Copy</button>

        <button id="clearBtn">Clear</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
