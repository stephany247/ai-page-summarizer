<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Summarizer</title>

    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <h1 class="container">AI Summarizer</h1>
    <div class="page-info">
      <p class="label">CURRENT PAGE</p>

      <div class="page-meta">
        <img alt="Favicon" id="favicon" />

        <div>
          <h2 id="pageTitle">Loading...</h2>

          <a id="pageUrl" target="_blank"></a>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="tabs">
        <button class="tab active" data-mode="standard">Standard</button>
        <button class="tab" data-mode="quick">Quick Digest</button>
      </div>

      <button id="summarizeBtn">SUMMARIZE PAGE</button>
      <div class="stats">
        <span id="readingTime"> 0 min read </span>

        <span id="wordCount"> 0 words </span>
      </div>
      <p id="output">
        Click <span>summarize page</span> to extract this page into bullets, key
        insights, and an estimated reading time.
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
